<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SunPath</title>
  <script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
    }
    button {
      padding: 10px 20px;
      border: none;
      background: #38bdf8;
      color: black;
      border-radius: 8px;
      cursor: pointer;
    }
    canvas {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>🌞 Horas de luz</h2>
    <p id="status">Obteniendo ubicación...</p>
    <button onclick="init()">Calcular</button>
    <canvas id="chart"></canvas>
  </div>

<script src="script.js"></script>

</body>
</html>
