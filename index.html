<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SunPath</title>
  <script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="card">
    <h2>🌞 SunPath</h2>
    <p id="status">Obteniendo ubicación...</p>
    <button onclick="init()">Calcular</button>
    <canvas id="chart"></canvas>
  </div>

  <!-- Modal de Advertencia -->
  <div id="locationModal" class="modal-overlay">
    <div class="modal-content">
      <h3>📍 Ubicación aproximada</h3>
      <p>No pudimos acceder a tu GPS de alta precisión. Usaremos tu dirección IP, lo cual puede tener un pequeño margen de error.</p>
      <button onclick="closeModal()">Entendido</button>
    </div>
  </div>

<script src="script.js"></script>

</body>
</html>
